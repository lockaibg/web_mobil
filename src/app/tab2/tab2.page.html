<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      @if (switchPage) {
        <h1>Séries</h1>
      } @else {
        <h1>Films</h1>
      }
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-toolbar>
  <ion-segment [(ngModel)]="switchPage">
    <ion-segment-button [value]="true">
      <ion-label>Séries</ion-label>
    </ion-segment-button>
    <ion-segment-button [value]="false">
      <ion-label>Films</ion-label>
    </ion-segment-button>
  </ion-segment>
</ion-toolbar>


<ion-content>
  <form [formGroup]="myForm">
    <ion-item>
      <ion-input type="text" formControlName="text" placeholder="Rechercher un film..."></ion-input>
    </ion-item>
  </form>
  <ion-button (click)="onRecherche()">Rechercher</ion-button>

  <app-liste-series [recherche]="recherche"></app-liste-series>


@if (switchPage) {
  <div class="series">

    <app-list-card title="En cours" [items]="seriesEnCours"></app-list-card>
    <app-list-card title="Ma Liste" [items]="seriesAjoutes"></app-list-card>
    <app-list-card title="Séries terminés" [items]="seriesVues"></app-list-card>
    <app-list-card title="Tendance" [items]="filmsAjoutes"></app-list-card>
  </div>
}
@if (!switchPage) {
  <div class="films">

    <app-list-card title="Ma Liste" [items]="filmsAjoutes"></app-list-card>

    <app-list-card title="Films regardés" [items]="filmsVus"></app-list-card>

    <app-list-card title="Tendance" [items]="filmsAjoutes"></app-list-card>
  </div>
}
</ion-content>
