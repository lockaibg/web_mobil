<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Tab 2
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-toolbar>
  <ion-segment [(ngModel)]="switchPage">
    <ion-segment-button [value]="true">
      <ion-label>Séries</ion-label>
    </ion-segment-button>
    <ion-segment-button [value]="false">
      <ion-label>Films</ion-label>
    </ion-segment-button>
  </ion-segment>
</ion-toolbar>


<ion-content>
  <form [formGroup]="myForm">
    <ion-item>
      <ion-input type="text" formControlName="text" placeholder="Rechercher un film..."></ion-input>
    </ion-item>
  </form>
  <ion-button (click)="onRecherche()">Rechercher</ion-button>

  <app-liste-series [recherche]="recherche"></app-liste-series>
</ion-content>

@if (switchPage) {
  <div class="series">
    <p>salut à tous voici les séries</p>
    @for (section of test; track section.titre) {
      <div class="series-row">
        <h2 class="series-row-title">{{ section.titre }}</h2>

        <div class="scroll-horizontal">
        @for (item of section.items; track item) {
          <h3>{{ item }}</h3>
        }
        </div>
      </div>
    }
  </div>

}
@if (!switchPage) {
  <div class="films">
    <p>films.;;;</p>
  </div>
}
