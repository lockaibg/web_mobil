<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Séries
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-list>
    @for (episode of getMessages(); track episode) {
      <div (click)="goToEpisode(episode)">
        <app-episode [episode]="episode"></app-episode>
      </div>
    }
  </ion-list>

</ion-content>
