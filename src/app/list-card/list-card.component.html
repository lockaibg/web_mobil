<div class="row">
  <h2 class="title">{{ title }}</h2>
  <div class="scroll-horizontal">
    @for (item of items; track item) {
      <div class="card">
        <img [src]="item.poster_path" [alt]="item.title" class="card-image">
        <p class="card-title">{{ item.title }}</p>
      </div>
    }
  </div>
  <div class="empty">
    @if (items.length === 0) {
      <p>Aucun élément dans cette liste.</p>
    }
  </div>
</div>
